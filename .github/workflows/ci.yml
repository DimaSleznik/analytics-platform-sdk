name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet build AnalyticsPlatform.Core.csproj --nologo
      - run: dotnet test "Tests~/AnalyticsPlatform.Core.Tests.csproj" --nologo
